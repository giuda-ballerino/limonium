baseURL = 'https://example.org/'
languageCode = 'it-IT'
title = 'Limonium'
defaultContentLanguage = 'it'
defaultContentLanguageInSubdir = false

# Build settings
buildDrafts = false
buildFuture = false
buildExpired = false

# Server settings (for live reload)
[server]
  port = 1313

# Pagination
[pagination]
  pagerSize = 10

# Disable taxonomies for now (can enable later if needed)
[taxonomies]

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^SHOPIFY_STORE_DOMAIN$', '^SHOPIFY_STOREFRONT_ACCESS_TOKEN$', '^SHOPIFY_API_VERSION$']

[languages]
  [languages.it]
    languageName = 'Italiano'
    languageCode = 'it-IT'
    weight = 1

  [languages.en]
    languageName = 'English'
    languageCode = 'en-US'
    weight = 2

