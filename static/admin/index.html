<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Pages CMS</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f3f3;
        color: #0a0a0a;
      }
      .card {
        width: min(92vw, 560px);
        background: #ffffff;
        border: 1px solid #e6dede;
        border-radius: 14px;
        padding: 1.25rem 1.3rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.2rem;
      }
      p {
        margin: 0.35rem 0;
        line-height: 1.45;
      }
      a.btn {
        margin-top: 0.85rem;
        display: inline-block;
        padding: 0.55rem 0.85rem;
        border-radius: 999px;
        border: 1px solid #0a0a0a;
        text-decoration: none;
        color: #0a0a0a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Pages CMS</h1>
      <p>This project now uses Pages CMS instead of Decap CMS.</p>
      <p>Open Pages CMS and select this GitHub repository/branch to edit content.</p>
      <a class="btn" href="https://app.pagescms.org" target="_blank" rel="noopener">Open Pages CMS</a>
    </main>
  </body>
</html>
