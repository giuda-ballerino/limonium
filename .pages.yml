media:
  input: static/images/uploads
  output: /images/uploads

content:
  - name: eventi
    label: Eventi
    type: collection
    path: content/eventi
    format: yaml-frontmatter
    fields:
      - name: title
        label: Nome evento
        type: string
      - name: event_date
        label: Data evento
        type: date
      - name: image
        label: Immagine evento
        type: image
      - name: description
        label: Descrizione breve (max 150 caratteri)
        type: string
        options:
          maxlength: 150
      - name: registration_url
        label: Link registrazione
        type: string

settings:
  hide: true
